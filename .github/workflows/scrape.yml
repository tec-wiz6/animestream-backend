name: Scrape Anime Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm install  # Changed from npm ci to npm install
        
      - name: Create cache directory
        run: mkdir -p cache
        
      - name: Run scraper
        run: npm run scrape
        
      - name: Upload cache as artifact
        uses: actions/upload-artifact@v4
        with:
          name: anime-cache
          path: cache/
          retention-days: 7
