name: Scrape Anime Data

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          
      - name: Install dependencies
        run: npm ci
        
      - name: Run scraper
        run: npm run scrape
        continue-on-error: true
        
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: scrape-results
          path: |
            cache/
            *.log
          retention-days: 3
          
      - name: Debug - Show what was scraped
        run: |
          echo "📁 Cache directory contents:"
          ls -la cache/ || echo "No cache directory"
          echo ""
          echo "📄 Log files:"
          ls -la *.log 2>/dev/null || echo "No log files"
